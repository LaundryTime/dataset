name: Notify API repository when release
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - name: Notify API repository
        env:
          RELEASE_NAME: ${{ github.event.release.tag_name }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/EurovisionApi/eurovision-api/dispatches \
            -d "{\"event_type\": \"update-dataset\", \"client_payload\": {\"releaseName\": \"${RELEASE_NAME}\"}}"
